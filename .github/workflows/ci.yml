name: 🧪 CI - Build & Test

on:
  pull_request:
    branches:
      - develop
      - qa
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run linter
        if: runner.os == 'Linux'
        run: |
          if npm run | grep -q "lint"; then npm run lint; else echo "No lint script"; fi

      - name: Run tests
        run: |
          if npm run | grep -q "test"; then npm test --silent; else echo "No test script"; fi

      - name: Build
        if: success() && (github.event_name == 'push' || github.event_name == 'pull_request')
        run: |
          if npm run | grep -q "build"; then npm run build; else echo "No build script"; fi

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ./test-results || ./reports || ./coverage || ./**/test-results || ./**/coverage || .